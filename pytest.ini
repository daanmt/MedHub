[pytest]
; Harness minimo (F12, engenharia-ledger part-4).
; Coleta: o unittest nativo + o bridge (que roda os 3 suites script-style por
; subprocess e asserta exit code). Os scripts test_fsrs/test_memory/
; test_revisao_calibrada NAO sao coletados crus de proposito: suas funcoes
; imprimem checks sem assert -- coleta crua viraria verde decorativo.
testpaths = tools
; test_preparacao/test_orquestrador/test_reincidencia (orquestracao parts 1-3) tem asserts nativos -- coleta direta segura.
python_files = test_autonomia_hooks.py test_pytest_bridge.py test_preparacao.py test_orquestrador.py test_reincidencia.py
